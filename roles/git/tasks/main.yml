---
- name: Install package
  package:
    name: "{{ item }}"
    state: present
  become: true
  loop: "{{ app_package_name }}"

- name: Create symlinks
  file:
    src: "{{ role_path }}/files/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop: "{{ app_file_symlinks }}"
