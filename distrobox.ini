[ansible-fedora]
image=fedora:latest
init=true
start_now=false
replace=true
entry=false
home=/tmp/home
volume=".:/tmp/home/.ansible/collections/ansible_collections"
additional_packages="ansible"
additional_packages="gcc python3-pip python3-devel openssl-devel python3-libselinux"
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/podman;
init_hooks=python3 -m ensurepip;
init_hooks=python3 -m pip install molecule ansible-core;
init_hooks=python3 -m pip install --upgrade --user setuptools;
init_hooks=python3 -m pip install --user molecule;
init_hooks=python3 -m pip install --user molecule ansible-lint;
init_hooks=python3 -m pip install --user "molecule-plugins[podman]";
