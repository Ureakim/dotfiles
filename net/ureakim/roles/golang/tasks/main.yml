---
- name: Install tools
  package:
    name: 
      - curl
      - unzip
      - gawk
    update_cache: true
    state: present
  become: yes

- name: Remove golang from packages
  package:
    name: "golang"
    state: absent
  become: yes

- name: Get the current installed golang version
  shell: awk 'NR==1 {print; exit}' ~/.local/go/VERSION
  register: go_installed
  changed_when: false
  failed_when: false

- name: Get the latest golang version
  shell: "curl 'https://go.dev/VERSION?m=text' | head -n 1"
  register: go_latest
  changed_when: false

- name: Create `~/.local` directory
  file:
    path: ~/.local
    state: directory
    mode: '0755'

- name: Prints two lines of messages, but only if there is an environment value set
  ansible.builtin.debug:
    msg:
    - "{{go_installed.stdout}} {{go_latest.stdout}}"

- name: Remove old version of golang
  file:
    path: ~/.local/go
    state: absent
  when: go_installed.stdout != go_latest.stdout

- name: Download and install golang
  unarchive:
    src: https://go.dev/dl/{{ go_latest.stdout }}.linux-{{ arch[ansible_architecture] }}.tar.gz
    dest: ~/.local/
    remote_src: yes
  when: go_installed.stdout != go_latest.stdout

- name: Get the current installed gopls version
  shell: gopls version | cut -d' ' -f 2
  register: gopls_version
  changed_when: false
  failed_when: false
  environment:
    PATH: "~/.local/go/bin:{{ lookup('env', 'PATH') }}"

- name: Get the latest gopls version
  shell: go list -m golang.org/x/tools/gopls@latest | cut -d' ' -f 2
  register: gopls_latest
  changed_when: false
  environment:
    PATH: "~/.local/go/bin:{{ lookup('env', 'PATH') }}"

- name: Install the latest version of gopls
  shell: go install golang.org/x/tools/gopls@latest
  when: gopls_version.stdout != gopls_latest.stdout
  environment:
    PATH: "~/.local/go/bin:{{ lookup('env', 'PATH') }}"

