---
packages:
  Debian:
    - i3
    - i3lock
    - i3blocks
    - rofi
    - arandr
    - picom
    - dunst
    - solaar
    - feh
    - xfce4-power-manager
    - nm-tray
  RedHat:
    - i3
    - i3lock
    - i3blocks
    - rofi
    - arandr
    - picom
    - dunst
    - solaar
    - feh
    - xfce4-power-manager
    - network-manager-applet

files:
  - src: "dunst"
    dest: "~/.config/dunst"
  - src: "i3"
    dest: "~/.config/i3"
  - src: "i3blocks"
    dest: "~/.config/i3blocks"
  - src: "i3status"
    dest: "~/.config/i3status"
  - src: "picom.conf"
    dest: "~/.config/picom.conf"
  - src: "rofi"
    dest: "~/.config/rofi"
  - src: "_gitconfig"
    dest: "~/.gitconfig"
  - src: "_screenlayout"
    dest: "~/.screenlayout"
  - src: "bin/i3_launch_or_scratchpad.sh"
    dest: "~/bin/i3_launch_or_scratchpad.sh"
  - src: "bin/rofi-script.py"
    dest: "~/bin/rofi-script.py"


