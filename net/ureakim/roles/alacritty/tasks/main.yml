---
- name: Ensure alacritty and dependencies are at the latest version
  package:
    name: "{{packages}}"
    update_cache: true
    state: present
  become: yes

- name: Create `~/.config` directory
  file:
    path: ~/.config
    state: directory
    mode: '0755'

- name: Symlink configurations
  file:
    src: "{{ role_path }}/files/{{ item.src }}"
    dest: "{{ item.dest }}"
    force: true
    state: link
  loop: "{{files}}"

